name: Build & Push Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to short SHA)"
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "zero-touch-kubernestes-digital-ocean/src/**"

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: ${{ vars.DO_REGISTRY_NAME }}

jobs:
  build-and-push:
    name: "Build ${{ matrix.app }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: app-a-backend
            context: zero-touch-kubernestes-digital-ocean/src/app-a/backend
          - app: app-a-frontend
            context: zero-touch-kubernestes-digital-ocean/src/app-a/frontend
          - app: app-b-api
            context: zero-touch-kubernestes-digital-ocean/src/app-b/backend-api
          - app: app-b-worker
            context: zero-touch-kubernestes-digital-ocean/src/app-b/worker
          - app: app-b-frontend
            context: zero-touch-kubernestes-digital-ocean/src/app-b/frontend
          - app: app-c-backend
            context: zero-touch-kubernestes-digital-ocean/src/app-c/backend
          - app: app-c-frontend
            context: zero-touch-kubernestes-digital-ocean/src/app-c/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ matrix.app }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ matrix.app }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ matrix.app }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ matrix.app }}:cache,mode=max

      - name: Summary
        run: |
          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ matrix.app }}:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
