# =============================================================================
# PostgreSQL - Managed by DigitalOcean
# =============================================================================
# The PostgreSQL cluster is provisioned via Terraform (iac/main.tf) as a
# DigitalOcean Managed Database. No in-cluster StatefulSet is needed.
#
# Terraform creates:
#   - digitalocean_database_cluster.postgres  (engine: pg 16, region: fra1)
#   - digitalocean_database_db.app_a          (database: app_a)
#   - digitalocean_database_db.app_c          (database: app_c)
#   - digitalocean_database_firewall.postgres (allows traffic from DOKS cluster)
#   - kubernetes_secret.postgres_credentials  (namespace: infra, name: managed-postgres)
#
# Apps connect using the secret injected by Terraform:
#   kubectl get secret managed-postgres -n infra
#
# Connection details (private network, TLS required):
#   host: <cluster>.db.ondigitalocean.com
#   port: 25060
#   sslmode: require
# =============================================================================
