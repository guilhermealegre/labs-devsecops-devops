# =============================================================================
# Root Application - App of Apps Pattern
# =============================================================================
# This is the bootstrap application that ArgoCD uses to discover and manage
# all other applications. It watches the 'apps/' directory for Application
# definitions.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # IMPORTANT: Update this to your actual repository URL
    repoURL: https://github.com/YOUR_USERNAME/devops-lab.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
